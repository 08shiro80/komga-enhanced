application.version: TESTING

komga:
  database:
    file: "\${java.io.tmpdir}/database\${random.uuid}.sqlite"
    journal-mode: WAL
  tasks-db:
    file: "\${java.io.tmpdir}/tasks\${random.uuid}.sqlite"
    journal-mode: WAL

spring:
  flyway:
    enabled: true

management:
  httpexchanges:
    recording:
      enabled: false

logging:
  level:
    org.gotson.komga: DEBUG
